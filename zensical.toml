[project]
site_name = "Living Ice Sheet Temperature"
site_description = "Radar-derived ice temperature data visualization for Antarctica."
site_url = "https://elizadawson.github.io/living-ice-sheet-temperature/docs/"
repo_url = "https://github.com/elizadawson/living-ice-sheet-temperature"
copyright = "Copyright &copy; 2026 Development Seed"
edit_uri = "edit/main/docs/"
nav = [
    "index.md",
    {"API" = [
        "api/index.md",
        "api/borehole.md",
        "api/client.md",
        "api/config.md",
        "api/temperature.md",
    ]}
]

[project.theme]
favicon = "thermometer-snowflake.png"
language = "en"

[project.theme.icon]
logo = "lucide/thermometer-snowflake"
repo = "fontawesome/brands/github"

features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false
